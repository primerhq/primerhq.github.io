sections:
  - id: getting-started
    title: Getting Started
    icon: zap
    order: 1
    docs:
      - introduction
      - quickstart
  # The Features section is a TWO-LEVEL tree. Its `items` list is ordered;
  # each item is either:
  #   - a leaf: a full "<section>/<slug>" string (resolved against the index); or
  #   - a group: { title, overview: <full-slug>, children: [<full-slug>, ...] }
  #     whose header is clickable (navigates to `overview`) and expands to
  #     its `children`.
  # Physical directories are unchanged: grouping is logical only. Leaves and
  # group members may live in any directory (toolsets/, embedding/, ...).
  - id: features
    title: Features
    icon: tools
    order: 2
    items:
      - features/llm-providers
      - features/agents
      - features/chats
      - title: Toolsets & Tools
        overview: toolsets/overview
        children:
          - toolsets/toolsets-system
          - toolsets/toolsets-external
          - toolsets/toolsets-approvals
      - title: Semantic Search
        overview: embedding/overview
        children:
          - embedding/embedding-providers
          - embedding/semantic-search-providers
          - embedding/collections-and-documents
          - embedding/cross-encoder-providers
          - embedding/internal-collections
      - title: Workspaces
        overview: workspaces/overview
        children:
          - workspaces/workspace-providers
          - workspaces/workspace-templates
          - workspaces/workspaces-and-sessions
          - workspaces/workspace-toolset
          - workspaces/yielding-tools
      - title: Graphs
        overview: graphs/overview
        children:
          - graphs/graphs
          - graphs/graph-node-types
          - graphs/graph-templating
      - title: Web
        overview: web/overview
        children:
          - web/web-search-providers
          - web/web-fetch-http
      - title: Channels
        overview: channels/overview
        children:
          - channels/channel-providers
          - channels/channels
          - channels/channel-rules
          - channels/channel-reply-binding
      - features/triggers
      - features/harnesses
      - features/mcp-server
      - features/workers
      - features/observability
  - id: reference
    title: Reference
    icon: doc
    order: 4
    docs:
      - rest-api-overview
      - api-agents
      - api-providers
      - api-sessions
      - api-chats
      - api-workspaces
      - api-knowledge
      - api-triggers
      - api-channels
      - api-tool-approval
      - api-toolsets
      - api-graphs
      - api-harnesses
      - api-workers-health
      - api-auth-tokens
      - mcp-server-reference
      - cli
      - env-vars
      - troubleshooting
